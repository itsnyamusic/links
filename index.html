        :root {

            justify-content: center;
        }

        .page {
            width: 100%;
            max-width: 480px;
            padding: 3.5rem 1.25rem 2.5rem;
        }

        /* ---- header ---- */
        .header {
            text-align: center;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .header::before {
            content: '';
            display: block;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--cyan));
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Space Mono', monospace;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            color: #fff;
        }

        .tagline {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 0.4rem;
            font-weight: 400;
        }

        .tag {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 0.25rem 0.8rem;
            margin-top: 0.8rem;
            background: var(--accent-glow);
        }

        /* ---- section labels ---- */
        .section-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.75rem;
        }

        .section + .section {
            margin-top: 2rem;
        }

        /* ---- link items ---- */
        .links {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1rem;
            background: var(--surface);
            color: var(--text);
            text-decoration: none;
            transition: background 0.12s;
        }

        .link:hover {
            background: #1a1a25;
        }

        .link-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .link-icon svg {
            width: 18px;
            height: 18px;
        }

        .link-text {
            flex: 1;
            min-width: 0;
        }

        .link-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .link-handle {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 1px;
        }

        .link-arrow {
            color: var(--text-dim);
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.12s;
            flex-shrink: 0;
        }

        .link:hover .link-arrow {
            opacity: 1;
        }

        .c-soundcloud svg { fill: #ff8800; }

            padding-top: 1rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            color: var(--text-dim);
